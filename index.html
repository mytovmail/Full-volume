<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>פול ווליום - מוזיקה חסידית לנשמה</title>
    <link rel="icon" type="image/png" href="./logo.png">
    
    <!-- טעינת העיצוב (Tailwind CSS) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- טעינת המנוע של React -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- טעינת Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50 font-sans text-slate-900 overflow-x-hidden pt-20">
    
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- הכנס כאן את מפתח ה-API שייצרת בשלב 1 ---
        const GOOGLE_DRIVE_API_KEY = "AIzaSyC9gU656GJMIrfkDoULIN-5tvD35qnqagQ"; // <--- שים את המפתח כאן!
        const ROOT_FOLDER_ID = "12eZNreOj_lxtMZMy1F6NAP5ZmzbiXOfK";

        // === אייקונים ===
        const Play = ({size=24, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>;
        const Mail = ({size=24, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"></rect><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"></path></svg>;
        const YoutubeIcon = ({size=24, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22.54 6.42a2.78 2.78 0 0 0-1.94-2C18.88 4 12 4 12 4s-6.88 0-8.6.42a2.78 2.78 0 0 0-1.94 2C1 8.16 1 12 1 12s0 3.84.54 5.58a2.78 2.78 0 0 0 1.94 2C5.12 20 12 20 12 20s6.88 0 8.6-.42a2.78 2.78 0 0 0 1.94-2C23 15.84 23 12 23 12s0-3.84-.54-5.58z"></path><polygon points="9.75 15.02 15.5 12 9.75 8.98 9.75 15.02"></polygon></svg>;
        const Music = ({size=24, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle></svg>;
        const FolderIcon = ({size=24, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 20h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.93a2 2 0 0 1-1.66-.9l-.82-1.2A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13c0 1.1.9 2 2 2Z"></path></svg>;
        const FileIcon = ({size=24, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"></path><polyline points="14 2 14 8 20 8"></polyline></svg>;
        const ChevronDown = ({size=24, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m6 9 6 6 6-6"></path></svg>;
        const ChevronUp = ({size=24, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m18 15-6-6-6 6"></path></svg>;
        const ArrowRight = ({size=24, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m9 18 6-6-6-6"></path></svg>;

        const getYoutubeId = (url) => {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        };

        // === רכיב כרטיסיית וידאו ===
        const VideoCard = ({ video }) => {
            const [isExpanded, setIsExpanded] = useState(false);
            const [isPlaying, setIsPlaying] = useState(false);
            const videoId = getYoutubeId(video.link);

            return (
                <div className="bg-white rounded-3xl overflow-hidden border border-slate-100 shadow-md hover:shadow-2xl transition-all duration-500 transform hover:-translate-y-2 flex flex-col h-full">
                    <div className="block relative aspect-video overflow-hidden group">
                        {isPlaying && videoId ? (
                            <iframe className="absolute inset-0 w-full h-full" src={`https://www.youtube.com/embed/${videoId}?autoplay=1`} frameBorder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowFullScreen></iframe>
                        ) : (
                            <div className="w-full h-full cursor-pointer relative" onClick={() => setIsPlaying(true)}>
                                <img src={video.thumbnail} alt={video.title} className="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700 ease-in-out" />
                                <div className="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent opacity-80 group-hover:opacity-100 transition-opacity"></div>
                                <div className="absolute inset-0 flex items-center justify-center">
                                    <div className="w-16 h-16 bg-red-600/90 rounded-full flex items-center justify-center text-white opacity-0 group-hover:opacity-100 transition-all duration-300 transform scale-50 group-hover:scale-100 shadow-xl border-2 border-white/20">
                                        <Play className="ml-1" size={32} />
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                    <div className="p-6 flex flex-col flex-grow">
                        <h3 className="font-bold text-lg text-slate-800 mb-4 line-clamp-2">{video.title}</h3>
                        <div className="mt-auto pt-4 border-t border-slate-100">
                            <button onClick={() => setIsExpanded(!isExpanded)} className="flex items-center justify-center gap-2 w-full py-2 px-4 rounded-xl bg-slate-50 hover:bg-red-50 text-slate-600 hover:text-red-600 text-sm font-bold transition-colors">
                                {isExpanded ? <ChevronUp size={18}/> : <ChevronDown size={18}/>}
                                {isExpanded ? 'הסתר תיאור' : 'הצג תיאור מפורט'}
                            </button>
                            <div className={`transition-all duration-500 overflow-hidden ${isExpanded ? 'max-h-[800px] opacity-100 mt-4' : 'max-h-0 opacity-0'}`}>
                                <div className="text-sm text-slate-600 leading-relaxed bg-slate-50 p-4 rounded-2xl border border-slate-200 whitespace-pre-wrap max-h-60 overflow-y-auto custom-scrollbar">
                                    {video.description || 'לא נמצא תיאור לסרטון זה.'}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // === רכיב סייר הדרייב ===
        const DriveExplorer = () => {
            const [currentFolder, setCurrentFolder] = useState(ROOT_FOLDER_ID);
            const [history, setHistory] = useState([]);
            const [items, setItems] = useState([]);
            const [loading, setLoading] = useState(false);

            useEffect(() => {
                if (!GOOGLE_DRIVE_API_KEY) return;
                fetchItems(currentFolder);
            }, [currentFolder]);

            const fetchItems = async (folderId) => {
                setLoading(true);
                try {
                    const q = `'${folderId}' in parents and trashed = false`;
                    const res = await fetch(`https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(q)}&fields=files(id,name,mimeType,webViewLink)&key=${GOOGLE_DRIVE_API_KEY}`);
                    const data = await res.json();
                    if (data.files) setItems(data.files);
                } catch (e) { console.error(e); }
                setLoading(false);
            };

            const openItem = (item) => {
                if (item.mimeType === 'application/vnd.google-apps.folder') {
                    setHistory([...history, currentFolder]);
                    setCurrentFolder(item.id);
                } else {
                    window.open(item.webViewLink, '_blank');
                }
            };

            const goBack = () => {
                const prev = history.pop();
                setHistory([...history]);
                setCurrentFolder(prev);
            };

            if (!GOOGLE_DRIVE_API_KEY) {
                return (
                    <div className="bg-white rounded-3xl p-12 text-center border-2 border-dashed border-slate-200">
                        <FolderIcon size={48} className="mx-auto text-slate-300 mb-4" />
                        <p className="text-slate-500 font-bold">אנא הזן מפתח API כדי להפעיל את סייר הקבצים המתקדם.</p>
                    </div>
                );
            }

            return (
                <div className="bg-white rounded-3xl overflow-hidden shadow-lg border border-slate-100 min-h-[500px] flex flex-col">
                    <div className="bg-slate-50 p-4 border-b border-slate-100 flex items-center justify-between">
                        <h4 className="font-bold flex items-center gap-2"><FolderIcon size={20} className="text-blue-500"/> קבצי מוזיקה</h4>
                        {history.length > 0 && (
                            <button onClick={goBack} className="flex items-center gap-1 text-blue-600 hover:bg-blue-50 px-3 py-1 rounded-lg font-bold transition-colors">
                                <ArrowRight size={18}/> חזור
                            </button>
                        )}
                    </div>
                    <div className="flex-grow p-4 overflow-y-auto max-h-[600px] custom-scrollbar">
                        {loading ? <div className="text-center p-10 animate-pulse text-slate-400">טוען קבצים...</div> : (
                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">
                                {items.map(item => (
                                    <div key={item.id} onClick={() => openItem(item)} className="p-4 rounded-2xl hover:bg-blue-50 border border-slate-50 hover:border-blue-100 transition-all cursor-pointer flex items-center gap-3">
                                        {item.mimeType === 'application/vnd.google-apps.folder' ? <FolderIcon className="text-blue-400" /> : <FileIcon className="text-slate-400" />}
                                        <span className="font-medium text-slate-700 truncate">{item.name}</span>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const App = () => {
            const [latestVideos, setLatestVideos] = useState([]);
            const [isLoading, setIsLoading] = useState(true);

            useEffect(() => {
                const channelId = 'UC0Ww0C4XHAT8FsQuevAt1fw'; 
                const rssUrl = encodeURIComponent(`https://www.youtube.com/feeds/videos.xml?channel_id=${channelId}`);
                fetch(`https://api.rss2json.com/v1/api.json?rss_url=${rssUrl}`)
                .then(res => res.json())
                .then(data => {
                    if (data && data.items) setLatestVideos(data.items.slice(0, 15));
                    setIsLoading(false);
                }).catch(() => setIsLoading(false));
            }, []);

            return (
                <div className="min-h-screen">
                    <style dangerouslySetInnerHTML={{ __html: `
                        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
                        .animate-fade-in-up { animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; }
                        .delay-100 { animation-delay: 100ms; }
                        .delay-200 { animation-delay: 200ms; }
                        .delay-300 { animation-delay: 300ms; }
                        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
                        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; }
                        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
                    `}} />

                    {/* Header קפוא תמיד */}
                    <header className="fixed top-0 left-0 right-0 bg-white/90 backdrop-blur-md shadow-sm z-[100] border-b border-slate-100">
                        <div className="max-w-7xl mx-auto px-4 py-3 flex flex-col md:flex-row justify-between items-center gap-4">
                            <div className="flex items-center gap-4">
                                <img src="./logo.png" alt="לוגו" className="w-12 h-12 object-contain" onError={e => e.target.style.display='none'} />
                                <div>
                                    <h1 className="text-2xl font-black text-slate-900 leading-none">פול ווליום</h1>
                                    <p className="text-xs font-bold text-slate-500 uppercase tracking-widest mt-1">Jewish Soul Music</p>
                                </div>
                            </div>
                            <nav className="flex gap-4 text-sm font-bold text-slate-600">
                                <a href="#about" className="hover:text-red-600 transition-colors">אודות</a>
                                <a href="#latest" className="hover:text-red-600 transition-colors">סרטונים</a>
                                <a href="#drive" className="hover:text-red-600 transition-colors">דרייב</a>
                                <a href="#subscribe" className="bg-red-600 text-white px-4 py-2 rounded-xl hover:bg-red-700 transition-all">הצטרפות</a>
                            </nav>
                        </div>
                    </header>

                    {/* About */}
                    <section id="about" className="py-20 max-w-5xl mx-auto px-4 text-center">
                        <div className="animate-fade-in-up">
                            <h2 className="text-5xl font-black mb-6">פול ווליום - לקצב וללב</h2>
                            <p className="text-xl text-slate-600 mb-12">סטים חמים, מחרוזות מקפיצות, ומוזיקה שמדליקה את הנשמה.</p>
                        </div>
                        <div className="bg-white rounded-[2.5rem] shadow-xl p-8 md:p-12 text-right border border-slate-100 animate-fade-in-up delay-100">
                            <h3 className="text-2xl font-bold mb-6 flex items-center gap-2 text-red-600"><Music/> מה מחכה לכם?</h3>
                            <div className="grid md:grid-cols-2 gap-6 mb-10">
                                <div className="flex items-start gap-3"><span>🎶</span><span>שירים שקטים לרגעים של רוגע.</span></div>
                                <div className="flex items-start gap-3"><span>🕺</span><span>קצב מדבק שקשה להישאר אדישים אליו.</span></div>
                                <div className="flex items-start gap-3"><span>🎹</span><span>מנגינות שמלטפות את הנשמה.</span></div>
                                <div className="flex items-start gap-3"><span>🎉</span><span>מוזיקה לאווירת חג.</span></div>
                            </div>
                            <div className="flex flex-wrap justify-center gap-4">
                                <a href="https://did.li/fullvolume-reservoir" target="_blank" className="bg-blue-600 text-white px-8 py-4 rounded-2xl font-bold hover:bg-blue-700 transition-all shadow-lg flex items-center gap-2"><FolderIcon size={20}/> כל הסטים בדרייב</a>
                                <a href="https://did.li/fv-support" target="_blank" className="bg-amber-500 text-white px-8 py-4 rounded-2xl font-bold hover:bg-amber-600 transition-all">לתמיכה ב-PayPal</a>
                            </div>
                        </div>
                    </section>

                    {/* YouTube */}
                    <section id="latest" className="py-20 bg-slate-100">
                        <div className="max-w-7xl mx-auto px-4">
                            <h2 className="text-4xl font-black mb-12 flex items-center gap-4"><YoutubeIcon className="text-red-600" size={40}/> העלו לאחרונה בערוץ</h2>
                            {isLoading ? <div className="text-center py-20 animate-pulse text-slate-400">טוען סרטונים...</div> : (
                                <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-8">
                                    {latestVideos.map((v, i) => <VideoCard key={i} video={v} />)}
                                </div>
                            )}
                        </div>
                    </section>

                    {/* Drive Section */}
                    <section id="drive" className="py-20 bg-slate-900">
                        <div className="max-w-7xl mx-auto px-4 text-white">
                            <h2 className="text-4xl font-black mb-12">מאגר הדרייב המלא</h2>
                            <DriveExplorer />
                        </div>
                    </section>

                    {/* Subscribe */}
                    <section id="subscribe" className="py-24 bg-red-600 text-white text-center">
                        <div className="max-w-4xl mx-auto px-4">
                            <h2 className="text-5xl font-black mb-6">הישארו מעודכנים!</h2>
                            <p className="text-red-100 text-xl mb-12">קבלו את הסטים החדשים ישירות למייל שלכם.</p>
                            <div className="bg-white rounded-[2.5rem] p-12 shadow-2xl">
                                <a href="mailto:fullvolume01+subscribe@googlegroups.com" className="inline-flex items-center gap-3 bg-red-600 text-white font-bold text-lg py-5 px-12 rounded-2xl hover:bg-red-700 transition-all shadow-xl">
                                    <Mail size={24} /> לחץ כאן להצטרפות במייל
                                </a>
                            </div>
                        </div>
                    </section>

                    {/* Footer */}
                    <footer className="bg-slate-950 text-slate-500 py-12 text-center">
                        <p className="mb-2">© 2026 פול ווליום. כל הזכויות שמורות.</p>
                        <p className="text-sm font-bold">האתר נבנה על ידי <a href="https://mytovmail.github.io/Good-heart/" target="_blank" className="text-red-500 hover:underline">לב טוב</a></p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
