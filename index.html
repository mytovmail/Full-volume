<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>פול ווליום - מוזיקה חסידית לנשמה</title>
    <link rel="icon" type="image/png" href="./logo.png">
    
    <!-- טעינת העיצוב (Tailwind CSS) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- טעינת המנוע של React -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- טעינת Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50 font-sans text-slate-900 overflow-x-hidden pt-24 md:pt-20">
    
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- הכנס כאן את מפתח ה-API שייצרת ---
        const GOOGLE_DRIVE_API_KEY = "AIzaSyC9gU656GJMIrfkDoULIN-5tvD35qnqagQ"; 
        const ROOT_FOLDER_ID = "12eZNreOj_lxtMZMy1F6NAP5ZmzbiXOfK";

        // === רכיבי אייקונים (SVG) ===
        const Play = ({size=24, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>;
        const Mail = ({size=24, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"></rect><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"></path></svg>;
        const YoutubeIcon = ({size=24, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22.54 6.42a2.78 2.78 0 0 0-1.94-2C18.88 4 12 4 12 4s-6.88 0-8.6.42a2.78 2.78 0 0 0-1.94 2C1 8.16 1 12 1 12s0 3.84.54 5.58a2.78 2.78 0 0 0 1.94 2C5.12 20 12 20 12 20s6.88 0 8.6-.42a2.78 2.78 0 0 0 1.94-2C23 15.84 23 12 23 12s0-3.84-.54-5.58z"></path><polygon points="9.75 15.02 15.5 12 9.75 8.98 9.75 15.02"></polygon></svg>;
        const Music = ({size=24, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle></svg>;
        const FolderIcon = ({size=24, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 20h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.93a2 2 0 0 1-1.66-.9l-.82-1.2A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13c0 1.1.9 2 2 2Z"></path></svg>;
        const FileIcon = ({size=24, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"></path><polyline points="14 2 14 8 20 8"></polyline></svg>;
        const ChevronDown = ({size=24, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m6 9 6 6 6-6"></path></svg>;
        const ChevronUp = ({size=24, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m18 15-6-6-6 6"></path></svg>;
        const ArrowRight = ({size=24, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m9 18 6-6-6-6"></path></svg>;
        const SearchIcon = ({size=20, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>;
        const XIcon = ({size=20, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>;

        // === רכיב אנימציה לגלילה ===
        const RevealOnScroll = ({ children, className = "", delay = "0ms" }) => {
            const [isVisible, setIsVisible] = useState(false);
            const ref = useRef();

            useEffect(() => {
                const observer = new IntersectionObserver(
                    ([entry]) => {
                        if (entry.isIntersecting) {
                            setIsVisible(true);
                            observer.unobserve(ref.current);
                        }
                    },
                    { rootMargin: "0px 0px -50px 0px", threshold: 0.1 }
                );
                if (ref.current) observer.observe(ref.current);
                return () => { if (ref.current) observer.disconnect(); };
            }, []);

            return (
                <div 
                    ref={ref} 
                    className={`${className} transition-all duration-1000 ease-out ${isVisible ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-12'}`}
                    style={{ transitionDelay: delay }}
                >
                    {children}
                </div>
            );
        };

        // === רכיב כרטיסיית וידאו ===
        const VideoCard = ({ video }) => {
            const [isExpanded, setIsExpanded] = useState(false);
            const [isPlaying, setIsPlaying] = useState(false);

            // פונקציה שהופכת טקסט לקישורים לחיצים ושומרת על ירידות שורה
            const renderDescription = (text) => {
                if (!text) return 'לא נמצא תיאור לסרטון זה.';
                const urlRegex = /(https?:\/\/[^\s]+)/g;
                const parts = text.split(urlRegex);
                return parts.map((part, i) => {
                    if (part.match(urlRegex)) {
                        return <a key={i} href={part} target="_blank" rel="noopener noreferrer" className="text-blue-600 hover:underline font-bold" dir="ltr" style={{display: 'inline-block'}}>{part}</a>;
                    }
                    return part;
                });
            };

            return (
                <div className="bg-white rounded-3xl overflow-hidden border border-slate-100 shadow-md hover:shadow-2xl transition-all duration-500 flex flex-col h-full group hover:-translate-y-2">
                    <div className="block relative aspect-video overflow-hidden">
                        {isPlaying && video.videoId ? (
                            <iframe className="absolute inset-0 w-full h-full" src={`https://www.youtube.com/embed/${video.videoId}?autoplay=1`} frameBorder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowFullScreen></iframe>
                        ) : (
                            <div className="w-full h-full cursor-pointer relative" onClick={() => setIsPlaying(true)}>
                                <img src={video.thumbnail} alt={video.title} className="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700 ease-in-out" />
                                <div className="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent opacity-80 group-hover:opacity-100 transition-opacity"></div>
                                <div className="absolute inset-0 flex items-center justify-center">
                                    <div className="w-16 h-16 bg-red-600/90 rounded-full flex items-center justify-center text-white opacity-0 group-hover:opacity-100 transition-all duration-300 transform scale-50 group-hover:scale-100 shadow-xl border-2 border-white/20">
                                        <Play className="ml-1" size={32} />
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                    <div className="p-6 flex flex-col flex-grow">
                        <h3 className="font-bold text-lg text-slate-800 mb-4 line-clamp-2">{video.title}</h3>
                        <div className="mt-auto pt-4 border-t border-slate-100">
                            <button onClick={() => setIsExpanded(!isExpanded)} className="flex items-center justify-center gap-2 w-full py-2 px-4 rounded-xl bg-slate-50 hover:bg-red-50 text-slate-600 hover:text-red-600 text-sm font-bold transition-colors">
                                {isExpanded ? <ChevronUp size={18}/> : <ChevronDown size={18}/>}
                                {isExpanded ? 'הסתר תיאור' : 'הצג תיאור מפורט'}
                            </button>
                            <div className={`transition-all duration-500 overflow-hidden ${isExpanded ? 'max-h-[800px] opacity-100 mt-4' : 'max-h-0 opacity-0'}`}>
                                <div className="text-sm text-slate-600 leading-relaxed bg-slate-50 p-4 rounded-2xl border border-slate-200 whitespace-pre-wrap max-h-60 overflow-y-auto custom-scrollbar text-right description-content">
                                    {renderDescription(video.description)}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // === רכיב סייר הדרייב עם חיפוש וצפייה ===
        const DriveExplorer = () => {
            const [currentFolder, setCurrentFolder] = useState(ROOT_FOLDER_ID);
            const [history, setHistory] = useState([]);
            const [items, setItems] = useState([]);
            const [loading, setLoading] = useState(false);
            const [searchTerm, setSearchTerm] = useState("");
            const [previewFile, setPreviewFile] = useState(null);

            useEffect(() => {
                if (!GOOGLE_DRIVE_API_KEY) return;
                fetchItems(currentFolder);
            }, [currentFolder]);

            const fetchItems = async (folderId) => {
                setLoading(true);
                try {
                    const q = `'${folderId}' in parents and trashed = false`;
                    const res = await fetch(`https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(q)}&fields=files(id,name,mimeType,webViewLink)&key=${GOOGLE_DRIVE_API_KEY}`);
                    const data = await res.json();
                    if (data.files) {
                        // Sort: folders first, then alphabet
                        const sorted = data.files.sort((a,b) => {
                            if (a.mimeType.includes('folder') && !b.mimeType.includes('folder')) return -1;
                            if (!a.mimeType.includes('folder') && b.mimeType.includes('folder')) return 1;
                            return a.name.localeCompare(b.name);
                        });
                        setItems(sorted);
                    }
                } catch (e) { console.error(e); }
                setLoading(false);
            };

            const openItem = (item) => {
                if (item.mimeType === 'application/vnd.google-apps.folder') {
                    setHistory([...history, currentFolder]);
                    setCurrentFolder(item.id);
                    setSearchTerm("");
                } else {
                    setPreviewFile(item);
                }
            };

            const goBack = () => {
                const newHistory = [...history];
                const prev = newHistory.pop();
                setHistory(newHistory);
                setCurrentFolder(prev);
                setSearchTerm("");
            };

            const filteredItems = useMemo(() => {
                if (!searchTerm) return items;
                return items.filter(i => i.name.toLowerCase().includes(searchTerm.toLowerCase()));
            }, [items, searchTerm]);

            if (!GOOGLE_DRIVE_API_KEY) {
                return (
                    <div className="bg-white rounded-3xl p-12 text-center border-2 border-dashed border-slate-200">
                        <FolderIcon size={48} className="mx-auto text-slate-300 mb-4" />
                        <p className="text-slate-500 font-bold tracking-tight">אנא הזן מפתח API כדי להפעיל את סייר הקבצים המתקדם.</p>
                    </div>
                );
            }

            return (
                <div className="bg-white rounded-[2.5rem] overflow-hidden shadow-2xl border border-slate-100 min-h-[600px] flex flex-col relative">
                    {/* Header Explorer */}
                    <div className="bg-slate-50 p-6 border-b border-slate-200 space-y-4">
                        <div className="flex flex-col md:flex-row items-center justify-between gap-4">
                            <div className="flex items-center gap-3">
                                <div className="p-2 bg-blue-100 text-blue-600 rounded-lg">
                                    <FolderIcon size={24} />
                                </div>
                                <h4 className="font-black text-xl text-slate-800">סייר הקבצים</h4>
                            </div>
                            
                            <div className="relative w-full md:w-64 group">
                                <input 
                                    type="text" 
                                    placeholder="חיפוש בתיקייה..." 
                                    className="w-full bg-white border border-slate-300 text-slate-900 placeholder-slate-400 rounded-xl py-2 pr-10 pl-4 focus:ring-2 focus:ring-blue-500 focus:outline-none text-sm transition-all group-hover:border-blue-300"
                                    value={searchTerm}
                                    onChange={(e) => setSearchTerm(e.target.value)}
                                />
                                <SearchIcon className="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 group-hover:text-blue-500 transition-colors" />
                            </div>
                        </div>

                        {history.length > 0 && (
                            <button onClick={goBack} className="flex items-center gap-2 text-blue-600 hover:text-blue-800 font-bold text-sm transition-colors">
                                <ArrowRight size={18}/> חזור לתיקייה הקודמת
                            </button>
                        )}
                    </div>

                    {/* Content Grid */}
                    <div className="flex-grow p-6 overflow-y-auto max-h-[600px] custom-scrollbar">
                        {loading ? (
                            <div className="flex flex-col items-center justify-center h-64 animate-pulse">
                                <div className="w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                                <p className="text-slate-400 font-bold">טוען את כל הטוב הזה...</p>
                            </div>
                        ) : filteredItems.length === 0 ? (
                            <div className="text-center py-20">
                                <SearchIcon size={48} className="mx-auto text-slate-200 mb-4" />
                                <p className="text-slate-400 font-medium">לא מצאנו קבצים שתואמים לחיפוש שלך.</p>
                            </div>
                        ) : (
                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
                                {filteredItems.map(item => (
                                    <div 
                                        key={item.id} 
                                        onClick={() => openItem(item)} 
                                        className="p-4 rounded-2xl bg-white border border-slate-100 hover:bg-blue-50 hover:border-blue-200 hover:shadow-lg transition-all cursor-pointer flex items-center gap-3 group"
                                    >
                                        <div className={`p-2 rounded-lg transition-colors ${item.mimeType.includes('folder') ? 'bg-amber-50 text-amber-500 group-hover:bg-amber-100' : 'bg-slate-50 text-slate-400 group-hover:bg-blue-100 group-hover:text-blue-500'}`}>
                                            {item.mimeType.includes('folder') ? <FolderIcon size={20} /> : <FileIcon size={20} />}
                                        </div>
                                        <span className="font-bold text-slate-700 truncate text-sm">{item.name}</span>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>

                    {/* Modal Preview */}
                    {previewFile && (
                        <div className="fixed inset-0 z-[1000] flex items-center justify-center p-4 md:p-10 bg-slate-900/90 backdrop-blur-sm animate-fade-in">
                            <div className="bg-white w-full max-w-5xl h-full max-h-[80vh] rounded-[2.5rem] flex flex-col overflow-hidden shadow-2xl relative">
                                <div className="p-6 border-b border-slate-100 flex items-center justify-between">
                                    <h5 className="font-black text-lg text-slate-800 truncate pl-8">{previewFile.name}</h5>
                                    <button onClick={() => setPreviewFile(null)} className="p-2 hover:bg-slate-100 rounded-full transition-colors">
                                        <XIcon size={24} className="text-slate-500" />
                                    </button>
                                </div>
                                <div className="flex-grow bg-slate-50">
                                    <iframe 
                                        src={`https://drive.google.com/file/d/${previewFile.id}/preview`} 
                                        className="w-full h-full"
                                        frameBorder="0"
                                    ></iframe>
                                </div>
                                <div className="p-4 bg-slate-50 text-center">
                                    <a href={previewFile.webViewLink} target="_blank" className="text-blue-600 font-bold hover:underline">פתח בטאב חדש (להורדה)</a>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const App = () => {
            const [latestVideos, setLatestVideos] = useState([]);
            const [isLoading, setIsLoading] = useState(true);
            const [currentView, setCurrentView] = useState('home'); // ניהול מצב הדף: 'home' או 'subscribe'

            useEffect(() => {
                const channelId = 'UC0Ww0C4XHAT8FsQuevAt1fw'; 
                // כדי למשוך את ההעלאות של הערוץ במלואן, ממירים את הקידומת UC ל-UU
                const uploadsPlaylistId = channelId.replace('UC', 'UU');
                
                if (!GOOGLE_DRIVE_API_KEY) {
                    setIsLoading(false);
                    return;
                }

                // משיכה ישירה, רשמית ואמינה מה-API של יוטיוב!
                fetch(`https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&playlistId=${uploadsPlaylistId}&maxResults=15&key=${GOOGLE_DRIVE_API_KEY}`)
                .then(res => res.json())
                .then(data => {
                    if (data && data.items) {
                        const formattedVideos = data.items.map(item => ({
                            title: item.snippet.title,
                            description: item.snippet.description,
                            thumbnail: item.snippet.thumbnails?.maxres?.url || item.snippet.thumbnails?.high?.url || item.snippet.thumbnails?.medium?.url || item.snippet.thumbnails?.default?.url,
                            link: `https://www.youtube.com/watch?v=${item.snippet.resourceId.videoId}`,
                            videoId: item.snippet.resourceId.videoId
                        }));
                        setLatestVideos(formattedVideos);
                    }
                    setIsLoading(false);
                }).catch((err) => {
                    console.error("YouTube API Error", err);
                    setIsLoading(false);
                });
            }, []);

            return (
                <div className="min-h-screen flex flex-col bg-slate-50">
                    <style dangerouslySetInnerHTML={{ __html: `
                        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
                        @keyframes float {
                            0% { transform: translateY(0px); }
                            50% { transform: translateY(-12px); }
                            100% { transform: translateY(0px); }
                        }
                        .animate-fade-in { animation: fadeIn 0.3s ease forwards; }
                        .animate-float { animation: float 4s ease-in-out infinite; }
                        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
                        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
                        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
                        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
                        
                        /* עיצוב מיוחד לקישורים בתוך התיאור של הסרטונים */
                        .description-content a { color: #dc2626; text-decoration: none; font-weight: 500; }
                        .description-content a:hover { text-decoration: underline; }
                        .description-content br { display: block; content: ""; margin-top: 4px; }
                    `}} />

                    {/* Header קפוא תמיד */}
                    <header className="fixed top-0 left-0 right-0 bg-white/80 backdrop-blur-lg shadow-sm z-[500] border-b border-slate-100 h-20 md:h-20 flex items-center">
                        <div className="max-w-7xl mx-auto w-full px-6 flex flex-row justify-between items-center">
                            <div className="flex items-center gap-4 cursor-pointer group" onClick={() => { setCurrentView('home'); window.scrollTo(0,0); }}>
                                <div className="w-12 h-12 bg-white rounded-xl shadow-md p-1 border border-slate-100 overflow-hidden group-hover:scale-105 transition-transform duration-300">
                                    <img src="./logo.png" alt="לוגו" className="w-full h-full object-contain" onError={e => e.target.style.display='none'} />
                                </div>
                                <div className="hidden sm:block">
                                    <h1 className="text-xl font-black text-slate-900 leading-tight">פול ווליום</h1>
                                    <p className="text-[10px] font-bold text-red-600 uppercase tracking-widest">מוזיקה חסידית לנשמה</p>
                                </div>
                            </div>
                            <nav className="flex gap-2 md:gap-6 text-xs md:text-sm font-black text-slate-600 items-center">
                                {currentView === 'home' ? (
                                    <>
                                        <a href="#about" className="hover:text-red-600 hover:-translate-y-0.5 transition-all p-2">אודות</a>
                                        <a href="#latest" className="hover:text-red-600 hover:-translate-y-0.5 transition-all p-2">הסטים</a>
                                        <a href="#drive" className="hover:text-red-600 hover:-translate-y-0.5 transition-all p-2">דרייב</a>
                                    </>
                                ) : (
                                    <button onClick={() => { setCurrentView('home'); window.scrollTo(0,0); }} className="hover:text-red-600 transition-colors p-2">חזור לאתר</button>
                                )}
                                <button onClick={() => { setCurrentView('subscribe'); window.scrollTo(0,0); }} className="bg-red-600 text-white px-4 py-2 rounded-xl hover:bg-red-700 hover:shadow-lg hover:shadow-red-200 hover:-translate-y-0.5 transition-all">הצטרפות</button>
                            </nav>
                        </div>
                    </header>

                    <main className="flex-grow">
                        {currentView === 'home' ? (
                            <>
                                {/* About Section */}
                                <section id="about" className="py-20 max-w-5xl mx-auto px-6 text-center relative mt-8">
                                    <div className="absolute top-0 left-1/2 -translate-x-1/2 w-64 h-64 bg-red-100/50 rounded-full blur-3xl -z-10"></div>
                                    
                                    <RevealOnScroll>
                                        <div className="w-48 h-48 mx-auto mb-10 bg-white rounded-full p-3 shadow-2xl border-4 border-slate-50 flex items-center justify-center animate-float">
                                            <img src="./logo.png" alt="פול ווליום" className="w-full h-full object-contain" onError={e => { e.target.style.display='none'; e.target.nextSibling.style.display='block'; }} />
                                            <Music size={64} className="text-slate-300 hidden" style={{ display: 'none' }} />
                                        </div>
                                        <h2 className="text-4xl md:text-6xl font-black text-slate-900 mb-6 tracking-tighter">פול ווליום - נותנים לקצב לדבר, וללב להרגיש</h2>
                                        <p className="text-lg md:text-xl text-slate-600 mb-12 font-medium leading-relaxed max-w-3xl mx-auto">ברוכים הבאים לערוץ שמביא לכם את כל הטוב המוזיקלי - סטים חמים, מחרוזות מקפיצות, ומוזיקה שמדליקה בפול ווליום.</p>
                                    </RevealOnScroll>
                                    
                                    <RevealOnScroll delay="200ms">
                                        <div className="bg-white rounded-[3rem] shadow-2xl p-8 md:p-14 text-right border border-slate-100 relative">
                                            <div className="absolute top-0 right-12 w-16 h-2 bg-red-600 rounded-b-full"></div>
                                            <h3 className="text-2xl md:text-3xl font-black mb-10 flex items-center gap-4 text-slate-800">
